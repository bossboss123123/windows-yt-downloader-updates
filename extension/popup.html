<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;background:#1a1f2e;color:#eaf1ff}
.header{padding:10px 14px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.header h2{font-size:14px;font-weight:600;flex:1;min-width:0}
.url{font-size:11px;color:rgba(234,241,255,.45);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.settings-btn{flex-shrink:0;background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(234,241,255,.6);font-size:13px;padding:4px 9px;cursor:pointer;white-space:nowrap}
.settings-btn:hover{background:rgba(255,255,255,.1);color:#eaf1ff}
.section{padding:10px 12px 6px}
.section-title{font-size:11px;color:rgba(234,241,255,.5);font-weight:600;letter-spacing:.5px;margin-bottom:6px}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.btn{padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#eaf1ff;font-size:12px;cursor:pointer;text-align:center}
.btn:hover{background:rgba(255,255,255,.15)}
.btn.unavailable,.btn:disabled{opacity:.32;background:rgba(255,255,255,.035);border-color:rgba(255,255,255,.08);color:rgba(234,241,255,.35);cursor:not-allowed;filter:grayscale(1)}
.btn.best{grid-column:1/-1;background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);font-weight:600}
.full{grid-column:1/-1}
.divider{height:1px;background:rgba(255,255,255,.08);margin:4px 12px}
.status{padding:10px 14px 12px;font-size:12px;color:rgba(234,241,255,.68);display:none;white-space:pre-wrap}
.status.show{display:block}
.status.ok{color:#6ee7b7}
.status.err{color:#fca5a5}
.progress-wrap{margin:8px 14px 0;display:none}
.progress-wrap.show{display:block}
.progress-bar-bg{width:100%;height:10px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;border:1px solid rgba(255,255,255,.10)}
.progress-bar{width:0%;height:100%;border-radius:999px;background:#6ee7b7}
.progress-text{margin-top:6px;font-size:11px;color:rgba(234,241,255,.72);line-height:1.35;white-space:pre-wrap}
.not-youtube{padding:20px 16px;text-align:center;font-size:13px;color:rgba(234,241,255,.5)}
/* 設定面板 */
#settingsPanel{display:none}
#settingsPanel.show{display:block}
.settings-header{padding:14px 14px 4px;font-size:13px;font-weight:600}
.version-line{font-size:12px;color:rgba(234,241,255,.45);padding:0 14px 10px}
.settings-btns{padding:0 12px 14px;display:flex;flex-direction:column;gap:6px}
.settings-btns .btn{width:100%}
</style>
</head>
<body>
<div id="main" style="display:none">
  <div class="header">
    <div class="header-top">
      <h2>⬇ YT Downloader</h2>
      <button class="settings-btn" id="settingsToggle">⚙️ 設定</button>
    </div>
    <div class="url" id="pageUrl"></div>
  </div>

  <!-- 設定面板（展開時取代下載區） -->
  <div id="settingsPanel">
    <div class="settings-header">YT Downloader</div>
    <div class="version-line" id="versionLine">版本：—</div>
    <div class="settings-btns">
      <button class="btn" id="updateBtn">① 檢查更新</button>
      <button class="btn" id="deactivateBtn">② 解除授權</button>
      <button class="btn" id="rebindBtn">③ 重新綁定</button>
    </div>
  </div>

  <!-- 下載主畫面 -->
  <div id="downloadArea">
    <div class="section"><div class="section-title">影片 + 音訊</div><div class="btn-grid">
      <button class="btn best" data-mode="best">最佳畫質</button>
      <button class="btn" data-mode="video-4k">4K (2160p)</button>
      <button class="btn" data-mode="video-2k">2K (1440p)</button>
      <button class="btn" data-mode="video-1080">1080p</button>
      <button class="btn" data-mode="video-720">720p</button>
      <button class="btn" data-mode="video-480">480p</button>
      <button class="btn" data-mode="video-360">360p</button>
      <button class="btn" data-mode="video-240">240p</button>
      <button class="btn" data-mode="video-144">144p</button>
    </div></div>
    <div class="divider"></div>
    <div class="section"><div class="section-title">只下載音訊</div><div class="btn-grid">
      <button class="btn" data-mode="audio-mp3">MP3</button>
      <button class="btn" data-mode="audio-m4a">M4A</button>
    </div></div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0%</div>
  </div>
  <div class="status" id="status"></div>
</div>
<div id="notYoutube" class="not-youtube" style="display:none">請在 YouTube 影片頁面使用</div>
<script src="popup.js"></script>
</body>
</html>
